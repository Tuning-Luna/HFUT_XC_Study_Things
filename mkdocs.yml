site_name: HFUT-XC 计算机科学与技术资料汇总
site_description: 合肥工业大学宣城校区计算机科学与技术课程资料汇总，涵盖大一至大三全部课程PPT、实验、真题、教材、笔记代码
site_author: Tuning-Luna
site_url: https://tuning-luna.github.io/HFUT_XC_Study_Things
copyright: Copyright &copy; 2026 Tuning-Luna &mdash; 学生原创内容采用 CC BY-NC-SA 4.0 协议

repo_url: https://github.com/Tuning-Luna/HFUT_XC_Study_Things
edit_uri: ""

theme:
  name: material
  language: zh
  logo: assets/hfut.png
  favicon: assets/hfut.png
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: teal
      accent: teal
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.expand
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - toc.follow
    - header.autohide
    - palette.toggle

plugins:
  - search:
      lang: zh
  - tags
  - meta
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - offline

nav:
  - 首页: index.md
  - 公共课:
    - 思政教材: 【公共课】思政教材.md
    - 英语: 【公共课】英语.md
    - 题库及答案: 【公共课】题库及答案.md
  - 大一:
    - 高等数学: 【大一】高等数学.md
    - 线性代数: 【大一】线性代数.md
    - 数据结构: 【大一】数据结构.md
    - Java: 【大一】Java.md
    - 电路与电子技术基础: 【大一】电路与电子技术基础.md
    - 大学物理: 【大一】大学物理.md
    - 程序设计基础: 【大一】程序设计基础.md
  - 大二:
